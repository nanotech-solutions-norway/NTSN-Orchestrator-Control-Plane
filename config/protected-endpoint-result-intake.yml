# Protected endpoint validation result intake — O-RT13 — 2026-07-06

release_train: O-RT13
mode: ENDPOINT_VALIDATION_RESULT_INTAKE
repository_endpoint_calls_allowed: false
live_write_approved: false
intake_location: evidence/protected-endpoint-results
unknown_result_default: PENDING_REVIEW

scope_rule_20260708:
  ds_subdomain_scope: DOMENESHOP_MCP_ONLY
  orchestrator_runtime_health_endpoint: NOT_EVIDENCED
  orchestrator_readiness_method: REPOSITORY_VALIDATION_SUITE_ONLY

source_controls:
  - docs/ORT13_ENDPOINT_VALIDATION_RESULT_INTAKE_20260706.md
  - config/protected-endpoint-validation-execution.yml
  - templates/protected-endpoint-validation/PROTECTED_ENDPOINT_RESULT_TEMPLATE.json

accepted_targets:
  - domeneshop_mcp_public_health
  - domeneshop_mcp_status
  - conta_mcp
  - ntsn_orchestrator_control_plane

accepted_result_classes:
  - READ_ONLY_READY
  - PLAN_ONLY_READY
  - PENDING_REVIEW
  - NOT_CONFIGURED
  - FAILED_VALIDATION

required_fields:
  - validationId
  - releaseTrain
  - targetId
  - category
  - timestampUtc
  - operator
  - resultClass
  - httpStatus
  - statusSummary
  - evidenceReference
  - followUpRequired
  - sanitizationConfirmed

ingested_results:
  domeneshop_mcp_public_health:
    file: evidence/protected-endpoint-results/domeneshop_mcp_public_health.json
    scope: DOMENESHOP_MCP_ONLY
    resultClass: READ_ONLY_READY
    httpStatus: '200'
    intakeDecision: READ_ONLY_READY
    followUpRequired: none
  domeneshop_mcp_status:
    file: evidence/protected-endpoint-results/domeneshop_mcp_status.json
    scope: DOMENESHOP_MCP_ONLY
    resultClass: FAILED_VALIDATION
    httpStatus: request_failed
    intakeDecision: PENDING_REVIEW
    followUpRequired: review_endpoint_or_network
  conta_mcp:
    file: null
    resultClass: null
    intakeDecision: PENDING_OPERATOR_RESULT
    followUpRequired: run_o_rt12_wrapper
  ntsn_orchestrator_control_plane:
    file: evidence/protected-endpoint-results/ntsn_orchestrator_control_plane.json
    scope: REPOSITORY_VALIDATION_SUITE_ONLY
    resultClass: READ_ONLY_READY
    httpStatus: not_applicable_repository_suite
    intakeDecision: READ_ONLY_READY
    followUpRequired: none

current_result_status:
  real_operator_results_ingested: true
  domeneshop_mcp_public_health_ready: true
  domeneshop_mcp_protected_status_ready: false
  domeneshop_mcp_protected_status_pending_review: true
  orchestrator_repository_readiness_ready: true
