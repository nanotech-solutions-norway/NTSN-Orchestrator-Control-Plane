# Evidence status — updated 2026-07-06

status_legend:
  pending: evidence requested but not yet received
  received: evidence package received but not yet fully validated
  indexed: evidence package indexed into orchestrator repo
  refreshed: newer evidence package indexed and set as current status source
  active: evidence is active in orchestrator scope
  validated: workflow or operator validation completed
  out_of_scope: intentionally excluded from current scope
  pending_admin_export: connector evidence incomplete; manual/admin export required
  pending_review: source evidence is indexed but explicitly marked pending review or requires live/manual confirmation
  canonical: repository-controlled canonical source for current release train
  runtime_contract: repository-controlled runtime/schema contract
  plan_contract: repository-controlled plan-only policy/schema contract
  validation_harness: repository-controlled validation and drift-detection contract
  pr_change_control: repository-controlled PR-first controlled change path
  adapter_contract: repository-controlled provider adapter contract layer
  operations_pilot: repository-controlled approval-gated low-risk operations pilot
  runtime_client_config_refresh: repository-controlled MCP runtime/client evidence refresh
  protected_endpoint_validation_plan: repository-controlled protected endpoint validation planning
  runtime_readiness_report_pack: repository-controlled runtime readiness report pack
  local_client_evidence_pack: repository-controlled local MCP client evidence collection pack
  protected_endpoint_execution_pack: repository-controlled protected endpoint operator execution package
  endpoint_result_intake: repository-controlled sanitized endpoint result intake package
  log_review: repository-controlled validation log diagnosis and corrective action record
  admin_export_complete: repository-controlled GitHub admin/environment export completion evidence

